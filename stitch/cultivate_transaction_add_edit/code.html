<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=Jost:ital,wght@0,100..900;1,100..900&amp;family=Manrope:wght@200..800&amp;family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-container": "#605454",
              "background": "#110e0a",
              "tertiary-container": "#e4d7fd",
              "surface": "#110e0a",
              "secondary-dim": "#adbdb1",
              "secondary-container": "#1b2921",
              "surface-container-lowest": "#000000",
              "on-surface-variant": "#b3aa9f",
              "on-tertiary": "#5c5271",
              "error-dim": "#c8475d",
              "on-error-container": "#ff97a3",
              "tertiary": "#f1e7ff",
              "error": "#fd6f85",
              "outline": "#7c746b",
              "surface-variant": "#2a251e",
              "on-secondary-fixed-variant": "#59685e",
              "tertiary-fixed-dim": "#d6c9ee",
              "inverse-primary": "#685c5c",
              "on-tertiary-fixed-variant": "#5d5372",
              "surface-container-high": "#241f18",
              "on-primary": "#685c5c",
              "surface-tint": "#fff8f7",
              "surface-container-low": "#16130e",
              "on-tertiary-fixed": "#403755",
              "on-primary-fixed-variant": "#655959",
              "surface-container-highest": "#2a251e",
              "surface-container": "#1d1913",
              "error-container": "#8a1632",
              "tertiary-dim": "#d6c9ee",
              "secondary-fixed-dim": "#d6e7da",
              "on-error": "#490013",
              "primary-container": "#f9e7e7",
              "tertiary-fixed": "#e4d7fd",
              "outline-variant": "#4d473e",
              "inverse-on-surface": "#59544f",
              "primary-dim": "#eddcdc",
              "on-primary-fixed": "#483d3d",
              "secondary": "#bacabe",
              "primary": "#fff8f7",
              "on-secondary": "#35433a",
              "primary-fixed-dim": "#e1d1d1",
              "primary-fixed": "#f0dfde",
              "on-surface": "#efe4d8",
              "on-secondary-container": "#98a89c",
              "surface-dim": "#110e0a",
              "secondary-fixed": "#e5f5e8",
              "inverse-surface": "#fff8f3",
              "on-secondary-fixed": "#3d4b42",
              "on-background": "#efe4d8",
              "on-tertiary-container": "#534968",
              "surface-bright": "#312b23"
            },
            fontFamily: {
              "headline": ["Newsreader", "serif"],
              "body": ["Manrope", "sans-serif"],
              "label": ["Manrope", "sans-serif"],
              "serif": ["Instrument Serif", "serif"],
              "jost": ["Jost", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .grainy-overlay {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
        }
        .glow-accent {
            box-shadow: 0 0 20px -5px rgba(241, 231, 255, 0.2);
        }
        .mesh-gradient {
            background-color: #110e0a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(258,25%,15%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(144,19%,10%,1) 0, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body selection:bg-tertiary selection:text-on-tertiary overflow-x-hidden min-h-screen mesh-gradient">
<div class="fixed inset-0 grainy-overlay z-50"></div>
<header class="bg-[#110E0A] dark:bg-[#110E0A] flex justify-between items-center w-full px-6 py-4 sticky top-0 z-40">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-high border border-outline-variant/15 overflow-hidden">
<img alt="User profile photo" class="w-full h-full object-cover" data-alt="Elegant portrait of a woman for profile" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCHRKlYtSWee1DMgxTQrVtIuyP39qwJdKcyNMVEaYw7PlXsatjH_mLokbH2aojOqdNGjTH9XgAwz6Cy6vaunoFs9e7WdT9T_E9tAAZXhCcsqIx7UGm9DhwrK87PN_Wn2d7Ft8Vl7lnLerTb-dIYmVFazCNVXfcHMYahXD-YESrYl1acdZ7qu5x9HMR9tNK6B6PDH-yhz3qGxhyJfJOsX1yDHHUKJ8wao7QuLjAQIrrMInlEtSD2COxW2sDSr2fTQF9SLk3sWSFYOLQY"/>
</div>
<span class="text-2xl font-serif italic text-[#FFF8F7] tracking-widest">BLOOM</span>
</div>
<div class="flex items-center gap-6">
<span class="material-symbols-outlined text-[#FFF8F7] cursor-pointer">notifications</span>
<span class="material-symbols-outlined text-[#FFF8F7] cursor-pointer">close</span>
</div>
</header>
<main class="max-w-2xl mx-auto px-6 pt-12 pb-32">
<section class="mb-16 text-center">
<label class="text-[11px] font-medium tracking-[0.15em] uppercase font-jost text-on-surface-variant block mb-4">New Entry</label>
<div class="relative inline-block group">
<div class="absolute inset-0 bg-tertiary/10 blur-3xl rounded-full opacity-50"></div>
<input class="bg-transparent border-none text-center font-headline text-8xl md:text-9xl text-primary focus:ring-0 w-full p-0 cursor-default" readonly="" type="text" value="0.00"/>
<div class="absolute -right-8 top-1/2 -translate-y-1/2 text-tertiary text-2xl font-serif">USD</div>
</div>
</section>
<div class="grid grid-cols-1 gap-12">
<!-- Merchant & Category Shell -->
<div class="space-y-10">
<div class="relative">
<label class="text-[11px] font-medium tracking-[0.15em] uppercase font-jost text-on-surface-variant mb-2 block">Merchant</label>
<input class="w-full bg-transparent border-none border-b border-outline-variant/20 py-4 text-2xl font-serif text-primary placeholder:text-outline/40 focus:border-primary focus:ring-0 transition-all" placeholder="Enter name..." type="text"/>
<div class="absolute right-0 bottom-4 flex gap-4">
<button class="text-on-surface-variant hover:text-tertiary transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</button>
</div>
</div>
<div class="space-y-4">
<div class="flex justify-between items-end">
<label class="text-[11px] font-medium tracking-[0.15em] uppercase font-jost text-on-surface-variant">Category</label>
<span class="text-[10px] font-bold text-tertiary bg-on-tertiary-container/30 px-2 py-0.5 rounded-sm flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">auto_awesome</span>
                            AI SUGGESTED
                        </span>
</div>
<div class="grid grid-cols-4 gap-3">
<button class="flex flex-col items-center justify-center p-4 rounded-lg bg-surface-container-high border border-outline-variant/10 hover:border-tertiary/40 transition-all group">
<span class="material-symbols-outlined text-tertiary group-hover:scale-110 transition-transform mb-2">restaurant</span>
<span class="text-[9px] font-bold tracking-widest text-on-surface-variant">DINING</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-lg bg-surface-bright border border-tertiary/30 shadow-[0_0_15px_rgba(241,231,255,0.1)] transition-all group">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform mb-2" style="font-variation-settings: 'FILL' 1;">filter_vintage</span>
<span class="text-[9px] font-bold tracking-widest text-primary">LIFESTYLE</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-lg bg-surface-container-high border border-outline-variant/10 hover:border-tertiary/40 transition-all group">
<span class="material-symbols-outlined text-tertiary group-hover:scale-110 transition-transform mb-2">commute</span>
<span class="text-[9px] font-bold tracking-widest text-on-surface-variant">TRAVEL</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-lg bg-surface-container-high border border-outline-variant/10 hover:border-tertiary/40 transition-all group">
<span class="material-symbols-outlined text-tertiary group-hover:scale-110 transition-transform mb-2">more_horiz</span>
<span class="text-[9px] font-bold tracking-widest text-on-surface-variant">OTHER</span>
</button>
</div>
</div>
</div>
<!-- Contextual Details Bento -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="p-6 bg-surface-container-low rounded-lg border border-outline-variant/5 flex flex-col justify-between min-h-[140px]">
<label class="text-[11px] font-medium tracking-[0.15em] uppercase font-jost text-on-surface-variant">Date</label>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-tertiary">calendar_today</span>
<span class="text-xl font-serif text-primary">October 24, 2023</span>
</div>
</div>
<div class="p-6 bg-surface-container-low rounded-lg border border-outline-variant/5 flex flex-col justify-between min-h-[140px]">
<div class="flex justify-between items-start">
<label class="text-[11px] font-medium tracking-[0.15em] uppercase font-jost text-on-surface-variant">Split Transaction</label>
<div class="w-10 h-5 bg-outline-variant/20 rounded-full relative cursor-pointer">
<div class="absolute left-1 top-1 w-3 h-3 bg-on-surface-variant rounded-full transition-all"></div>
</div>
</div>
<p class="text-[11px] text-on-surface-variant/60 leading-relaxed font-body">Share this value with curators in your circle.</p>
</div>
<div class="md:col-span-2 p-6 bg-surface-container-low rounded-lg border border-outline-variant/5">
<label class="text-[11px] font-medium tracking-[0.15em] uppercase font-jost text-on-surface-variant mb-4 block">Notes &amp; Reflections</label>
<textarea class="w-full bg-transparent border-none p-0 text-sm text-on-surface focus:ring-0 resize-none h-20 placeholder:text-outline/30" placeholder="Write a brief entry..."></textarea>
</div>
</div>
<!-- Action Area -->
<div class="pt-8">
<button class="w-full bg-primary text-background py-5 rounded-sm font-jost font-bold tracking-[0.2em] text-xs hover:bg-tertiary transition-all active:scale-[0.98]">
                    COMMIT TO GALLERY
                </button>
</div>
</div>
</main>
<!-- Numeric Input Grid (Calculator Style) -->
<div class="fixed bottom-0 left-0 w-full z-50 bg-[#110E0A]/90 backdrop-blur-xl border-t border-outline-variant/15 transform translate-y-0 transition-transform duration-500 px-6 pt-6 pb-12">
<div class="max-w-md mx-auto grid grid-cols-4 gap-4">
<button class="p-4 text-xl font-serif text-on-surface hover:text-tertiary transition-colors">1</button>
<button class="p-4 text-xl font-serif text-on-surface hover:text-tertiary transition-colors">2</button>
<button class="p-4 text-xl font-serif text-on-surface hover:text-tertiary transition-colors">3</button>
<button class="p-4 flex items-center justify-center text-on-surface-variant hover:text-error transition-colors">
<span class="material-symbols-outlined">backspace</span>
</button>
<button class="p-4 text-xl font-serif text-on-surface hover:text-tertiary transition-colors">4</button>
<button class="p-4 text-xl font-serif text-on-surface hover:text-tertiary transition-colors">5</button>
<button class="p-4 text-xl font-serif text-on-surface hover:text-tertiary transition-colors">6</button>
<button class="p-4 text-xl font-serif text-on-surface-variant hover:text-tertiary transition-colors">÷</button>
<button class="p-4 text-xl font-serif text-on-surface hover:text-tertiary transition-colors">7</button>
<button class="p-4 text-xl font-serif text-on-surface hover:text-tertiary transition-colors">8</button>
<button class="p-4 text-xl font-serif text-on-surface hover:text-tertiary transition-colors">9</button>
<button class="p-4 text-xl font-serif text-on-surface-variant hover:text-tertiary transition-colors">×</button>
<button class="p-4 text-xl font-serif text-on-surface hover:text-tertiary transition-colors">.</button>
<button class="p-4 text-xl font-serif text-on-surface hover:text-tertiary transition-colors">0</button>
<button class="p-4 text-xl font-serif text-on-surface-variant hover:text-tertiary transition-colors">−</button>
<button class="p-4 text-xl font-serif text-on-surface-variant hover:text-tertiary transition-colors">+</button>
</div>
<!-- Bottom Tab Indicator -->
<div class="mt-4 flex justify-center">
<div class="w-12 h-1 bg-outline-variant/20 rounded-full"></div>
</div>
</div>
<!-- Background Decoration Elements -->
<div class="fixed top-[20%] -left-32 w-96 h-96 bg-secondary-container/10 blur-[120px] rounded-full pointer-events-none -z-10"></div>
<div class="fixed bottom-[10%] -right-32 w-96 h-96 bg-tertiary-container/5 blur-[120px] rounded-full pointer-events-none -z-10"></div>
</body></html>
